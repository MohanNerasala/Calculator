<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PremiumCalc</title>
    <link rel="stylesheet" href="style.css?v=13">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Calculator</div>
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
            <svg id="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg id="icon-sun"  width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5" fill="none"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/></svg>
        </button>
    </nav>
    <main class="main-content">
        <div class="calculator-container">
            <div class="calculator">
                <div class="top-bar">
                    <button class="icon-btn" onclick="toggleHistory()" title="History">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    </button>
                    <button class="icon-btn" onclick="toggleScientific()" title="Scientific Calculator">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"></path><path d="M12 12v9"></path><path d="m8 17 4 4 4-4"></path></svg>
                    </button>
                </div>

                <div id="history-panel" class="history-panel">
                    <div class="history-header">
                        <span>History</span>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <button class="clear-history" onclick="clearHistory()">Clear</button>
                            <button class="icon-btn" onclick="toggleHistory()" style="padding: 4px;">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            </button>
                        </div>
                    </div>
                    <div id="history-list" class="history-list"></div>
                </div>

                <div class="display-container">
                    <div class="display">
                        <input type="text" id="calc-display" readonly placeholder="0">
                    </div>
                </div>

                <div class="keypad-container">
                    <div id="scientific-keys" class="buttons scientific">
                        <button class="btn fn" onclick="appendFunction('sin')">sin</button>
                        <button class="btn fn" onclick="appendFunction('cos')">cos</button>
                        <button class="btn fn" onclick="appendFunction('tan')">tan</button>
                        <button class="btn fn" onclick="appendFunction('log')">log</button>
                        <button class="btn fn" onclick="appendFunction('ln')">ln</button>
                        <button class="btn fn" onclick="appendFunction('√')">√</button>
                        <button class="btn fn" onclick="appendOperator('^')">^</button>
                        <button class="btn fn" onclick="appendNumber('π')">π</button>
                        <button class="btn fn" onclick="appendNumber('e')">e</button>
                        <button class="btn fn" onclick="appendNumber('(')">(</button>
                        <button class="btn fn" onclick="appendNumber(')')">)</button>
                        <button class="btn fn" onclick="appendOperator('!')">!</button>
                    </div>
                    
                    <div class="buttons basic">
                        <button class="btn clear" onclick="clearDisplay()">AC</button>
                        <button class="btn operator" onclick="deleteLast()">DEL</button>
                        <button class="btn operator" onclick="appendOperator('%')">%</button>
                        <button class="btn operator" onclick="appendOperator('/')">÷</button>
    
                        <button class="btn" onclick="appendNumber('7')">7</button>
                        <button class="btn" onclick="appendNumber('8')">8</button>
                        <button class="btn" onclick="appendNumber('9')">9</button>
                        <button class="btn operator" onclick="appendOperator('*')">×</button>
    
                        <button class="btn" onclick="appendNumber('4')">4</button>
                        <button class="btn" onclick="appendNumber('5')">5</button>
                        <button class="btn" onclick="appendNumber('6')">6</button>
                        <button class="btn operator" onclick="appendOperator('-')">−</button>
    
                        <button class="btn" onclick="appendNumber('1')">1</button>
                        <button class="btn" onclick="appendNumber('2')">2</button>
                        <button class="btn" onclick="appendNumber('3')">3</button>
                        <button class="btn operator" onclick="appendOperator('+')">+</button>
    
                        <button class="btn zero" onclick="appendNumber('0')">0</button>
                        <button class="btn" onclick="appendNumber('.')">.</button>
                        <button class="btn equals" onclick="calculate()">=</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js?v=2"></script>
</body>
</html>
